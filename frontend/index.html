<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRUD de Produtos | Loja de Informatica</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <h1>Gerenciamento de Produtos</h1>
        <p class="page-subtitle">Cadastre, edite e remova produtos da loja.</p>
      </header>

      <div id="message" class="message" role="status" aria-live="polite"></div>

      <section class="content-grid">
        <section class="panel form-panel">
          <div class="panel-header">
            <div>
              <p class="panel-label">Formulario</p>
              <h2 id="form-title">Cadastrar Produto</h2>
            </div>
          </div>

          <form id="produto-form" class="product-form">
            <input type="hidden" id="produto-id" />

            <div class="field">
              <label for="nome">Nome do produto</label>
              <input
                type="text"
                id="nome"
                name="nome"
                placeholder="Ex: Mouse sem fio"
                minlength="3"
                required
              />
            </div>

            <div class="field">
              <label for="descricao">Descricao</label>
              <textarea
                id="descricao"
                name="descricao"
                rows="4"
                placeholder="Descreva o produto"
              ></textarea>
            </div>

            <div class="input-grid">
              <div class="field">
                <label for="preco">Preco</label>
                <input
                  type="number"
                  id="preco"
                  name="preco"
                  min="0.01"
                  step="0.01"
                  placeholder="0.00"
                  required
                />
              </div>

              <div class="field">
                <label for="categoriaId">ID da categoria</label>
                <input
                  type="number"
                  id="categoriaId"
                  name="categoriaId"
                  min="1"
                  step="1"
                  placeholder="1"
                  required
                />
              </div>
            </div>

            <div class="field">
              <label for="imagem">Imagem opcional</label>
              <input
                type="file"
                id="imagem"
                name="imagem"
                accept=".jpg,.jpeg,.png"
              />
              <p class="field-help">JPG e PNG.</p>
            </div>

            <div class="form-actions">
              <button type="submit" id="submit-button" class="btn btn-primary">
                Cadastrar
              </button>
              <button
                type="button"
                id="cancel-edit"
                class="btn btn-secondary"
                hidden
              >
                Cancelar edicao
              </button>
            </div>
          </form>
        </section>

        <section class="panel list-panel">
          <div class="panel-header panel-header-row">
            <div>
              <p class="panel-label">Produtos</p>
              <h2>Lista de Produtos</h2>
            </div>
            <span id="product-count" class="product-count">Carregando...</span>
          </div>

          <div id="product-list" class="product-list"></div>
        </section>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produtos | Loja de Informatica</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <div>
          <p class="eyebrow">Loja de Informatica</p>
          <h1>Produtos</h1>
        </div>
        <p class="page-description">
          Cadastre, edite e acompanhe os produtos da loja em uma tela simples.
        </p>
      </header>

      <p id="message" class="message" role="status" aria-live="polite"></p>

      <div class="layout">
        <aside class="form-panel" aria-labelledby="form-title">
          <div class="section-heading">
            <h2 id="form-title">Novo produto</h2>
            <p>Preencha os dados obrigatorios.</p>
          </div>

          <form id="produto-form" class="product-form">
            <input type="hidden" id="produto-id" />

            <div class="field">
              <label for="nome">Nome</label>
              <input
                id="nome"
                name="nome"
                type="text"
                minlength="3"
                autocomplete="off"
                placeholder="Mouse sem fio"
                required
              />
            </div>

            <div class="field">
              <label for="descricao">Descricao</label>
              <textarea
                id="descricao"
                name="descricao"
                rows="4"
                placeholder="Detalhes do produto"
              ></textarea>
            </div>

            <div class="field-row">
              <div class="field">
                <label for="preco">Preco</label>
                <input
                  id="preco"
                  name="preco"
                  type="number"
                  min="0.01"
                  step="0.01"
                  placeholder="0.00"
                  required
                />
              </div>

              <div class="field">
                <label for="categoriaId">Categoria</label>
                <input
                  id="categoriaId"
                  name="categoriaId"
                  type="number"
                  min="1"
                  step="1"
                  placeholder="1"
                  required
                />
              </div>
            </div>

            <div class="field">
              <label for="imagem">Imagem</label>
              <input id="imagem" name="imagem" type="file" accept=".jpg,.jpeg,.png" />
              <small>Usada apenas ao cadastrar.</small>
            </div>

            <div class="actions">
              <button id="submit-button" class="button button-primary" type="submit">
                Cadastrar
              </button>
              <button id="cancel-edit" class="button" type="button" hidden>
                Cancelar
              </button>
            </div>
          </form>
        </aside>

        <section class="products-section" aria-labelledby="products-title">
          <div class="list-header">
            <div class="section-heading">
              <h2 id="products-title">Lista de produtos</h2>
              <p id="product-count">Carregando...</p>
            </div>
            <button id="refresh-button" class="button" type="button">Atualizar</button>
          </div>

          <div id="product-list" class="product-list" aria-live="polite"></div>
        </section>
      </div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
